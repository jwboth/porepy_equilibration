name: Docker smoke test

on:
  push:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "entrypoint.sh"
      - "pyproject.toml"
      - "apps/**"
      - "src/**"
      - ".github/workflows/docker.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "entrypoint.sh"
      - "pyproject.toml"
      - "apps/**"
      - "src/**"
      - ".github/workflows/docker.yml"

jobs:
  docker-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Docker image
        run: docker build -t porepy-equilibration:ci .

      - name: Run entrypoint (all example2 variants)
        run: |
          mkdir -p output
          docker run --rm \
            -v "$PWD/output:/work/output" \
            porepy-equilibration:ci
